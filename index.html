<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Souly Infinity | Cập Nhật Mới</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap');
        
        body { 
            font-family: 'Space Grotesk', sans-serif; 
            background-color: #050505;
            color: #ffffff;
            overflow-x: hidden;
        }

        /* Nền hiệu ứng đốm sáng để nhận diện bản mới */
        .bg-glow {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 50%, #1e1b4b 0%, #050505 100%);
            z-index: -1;
        }

        .neon-border {
            position: relative;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(129, 140, 248, 0.2);
            backdrop-filter: blur(20px);
            transition: all 0.5s ease;
        }

        .neon-border:hover {
            border-color: #818cf8;
            box-shadow: 0 0 30px rgba(129, 140, 248, 0.2);
            transform: scale(1.02);
        }

        .text-neon {
            text-shadow: 0 0 10px rgba(129, 140, 248, 0.5);
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .floating {
            animation: floating 3s ease-in-out infinite;
        }

        @keyframes floating {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        #custom-modal {
            display: none;
            backdrop-filter: blur(15px);
        }
    </style>
</head>
<body>
    <div class="bg-glow"></div>

    <!-- Modal tùy chỉnh mới -->
    <div id="custom-modal" class="fixed inset-0 z-[100] flex items-center justify-center p-6">
        <div class="bg-[#111111] border border-indigo-500/30 p-8 rounded-3xl max-w-md w-full shadow-2xl">
            <div class="flex items-center gap-4 mb-6">
                <div class="w-12 h-12 bg-indigo-500/20 rounded-full flex items-center justify-center text-indigo-400">
                    <i class="fas fa-microchip"></i>
                </div>
                <h3 id="modal-title" class="text-xl font-bold">Thông báo hệ thống</h3>
            </div>
            <p id="modal-desc" class="text-gray-400 mb-8 leading-relaxed">Nội dung sẽ hiển thị ở đây.</p>
            <button onclick="hideModal()" class="w-full bg-indigo-600 py-4 rounded-xl font-bold hover:bg-indigo-500 transition-all active:scale-95">
                ĐÃ HIỂU
            </button>
        </div>
    </div>

    <!-- Header -->
    <header class="p-8 flex justify-between items-center max-w-7xl mx-auto">
        <div class="flex items-center gap-2 group cursor-pointer">
            <div class="w-10 h-10 bg-indigo-600 rounded-lg flex items-center justify-center group-hover:rotate-12 transition-transform">
                <i class="fas fa-bolt text-white"></i>
            </div>
            <span class="text-2xl font-bold tracking-tight">SOULY <span class="text-indigo-500">2.0</span></span>
        </div>
        <button onclick="notify('Đăng nhập', 'Cổng kết nối bảo mật đang được thiết lập...')" class="px-6 py-2 border border-white/10 rounded-full hover:bg-white/5 transition-all text-sm font-medium">
            Truy cập
        </button>
    </header>

    <main class="max-w-7xl mx-auto px-8 pt-12">
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-16 items-center">
            
            <div class="space-y-8">
                <h1 class="text-6xl md:text-8xl font-bold leading-tight">
                    <span class="text-neon">Digital</span><br>Legacy.
                </h1>
                <p class="text-gray-400 text-xl max-w-lg leading-relaxed">
                    Phiên bản cập nhật mới nhất với giao diện Neon. Nếu bạn thấy màu Tím này, nghĩa là bạn đã cập nhật thành công!
                </p>
                <div class="flex gap-4">
                    <button onclick="notify('Bắt đầu', 'Đang khởi tạo môi trường AI cho bạn...')" class="bg-indigo-600 px-8 py-4 rounded-2xl font-bold shadow-lg shadow-indigo-600/20 hover:-translate-y-1 transition-all">
                        Trải nghiệm ngay
                    </button>
                    <button onclick="notify('Xem thêm', 'Tài liệu hướng dẫn đang được tải...')" class="px-8 py-4 bg-white/5 rounded-2xl font-bold hover:bg-white/10 transition-all">
                        Tài liệu
                    </button>
                </div>
            </div>

            <div class="relative">
                <div class="floating neon-border p-8 rounded-[2.5rem] bg-[#0a0a0a]/80">
                    <div class="flex items-center justify-between mb-8">
                        <div class="flex gap-2">
                            <div class="w-3 h-3 rounded-full bg-red-500/50"></div>
                            <div class="w-3 h-3 rounded-full bg-yellow-500/50"></div>
                            <div class="w-3 h-3 rounded-full bg-green-500/50"></div>
                        </div>
                        <span class="text-[10px] text-gray-500 font-mono">STATUS: CONNECTED</span>
                    </div>
                    
                    <div class="space-y-6">
                        <div class="p-4 bg-white/5 rounded-2xl border border-white/5 flex items-center gap-4">
                            <div class="w-10 h-10 bg-indigo-500/20 rounded-lg flex items-center justify-center text-indigo-400 text-sm">
                                <i class="fas fa-brain"></i>
                            </div>
                            <div>
                                <p class="text-sm font-bold">Đồng bộ tư duy</p>
                                <p class="text-[10px] text-gray-500">Hoàn thành 88%</p>
                            </div>
                        </div>
                        
                        <div class="p-4 bg-white/5 rounded-2xl border border-white/5 flex items-center gap-4">
                            <div class="w-10 h-10 bg-purple-500/20 rounded-lg flex items-center justify-center text-purple-400 text-sm">
                                <i class="fas fa-database"></i>
                            </div>
                            <div>
                                <p class="text-sm font-bold">Lưu trữ Vault</p>
                                <p class="text-[10px] text-gray-500">1.2 GB dữ liệu đã mã hóa</p>
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- Trang trí -->
                <div class="absolute -top-10 -right-10 w-32 h-32 bg-indigo-600/20 blur-[60px] -z-10"></div>
                <div class="absolute -bottom-10 -left-10 w-32 h-32 bg-purple-600/20 blur-[60px] -z-10"></div>
            </div>
        </div>
    </main>

    <script>
        const modal = document.getElementById('custom-modal');
        const mTitle = document.getElementById('modal-title');
        const mDesc = document.getElementById('modal-desc');

        function notify(title, desc) {
            mTitle.innerText = title;
            mDesc.innerText = desc;
            modal.style.display = 'flex';
        }

        function hideModal() {
            modal.style.display = 'none';
        }

        window.onclick = function(event) {
            if (event.target == modal) hideModal();
        }
    </script>
</body>
</html>
